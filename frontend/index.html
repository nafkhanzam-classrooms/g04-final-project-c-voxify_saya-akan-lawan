<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxify Messenger - Group 04</title>
    <meta name="description" content="Voxify - Real-time chat application built with raw TCP sockets for Network Programming course" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ═══════ AUTH SCREENS ═══════ -->
    <div id="auth-container">
      <div id="auth-login-view" class="auth-card">
        <h1>VOXIFY SIGN IN</h1>
        <p>Kelompok G04 - Pemrograman Jaringan</p>
        <div class="input-group">
          <label>USERNAME</label>
          <input type="text" id="login-username" autocomplete="off" />
        </div>
        <div class="input-group">
          <label>PASSWORD</label>
          <input type="password" id="login-password" />
        </div>
        <button id="btn-execute-login" class="btn-primary">
          LOG IN System
        </button>
        <div class="auth-toggle">
          Belum punya akun? <span id="link-to-register">Daftar sekarang</span>
        </div>
      </div>

      <div id="auth-register-view" class="auth-card hidden">
        <h1>CREATE ACCOUNT</h1>
        <p>Kelompok G04 - Pemrograman Jaringan</p>
        <div class="input-group">
          <label>USERNAME</label>
          <input type="text" id="reg-username" autocomplete="off" />
        </div>
        <div class="input-group">
          <label>EMAIL ADDRESS</label>
          <input type="email" id="reg-email" autocomplete="off" />
        </div>
        <div class="input-group">
          <label>DISPLAY NAME</label>
          <input type="text" id="reg-display" autocomplete="off" />
        </div>
        <div class="input-group">
          <label>PASSWORD</label>
          <input type="password" id="reg-password" />
        </div>
        <button id="btn-execute-register" class="btn-primary">
          REGISTER SYSTEM
        </button>
        <div class="auth-toggle">
          Sudah punya akun? <span id="link-to-login">Masuk sistem</span>
        </div>
      </div>
    </div>

    <!-- ═══════ DASHBOARD ═══════ -->
    <div id="dashboard-container" class="hidden">
      <!-- ── Left Sidebar ── -->
      <div class="sidebar">
        <div class="profile-box">
          <span id="user-display-tag">🟢 Connecting...</span>
          <button id="btn-logout" class="btn-logout" title="Logout">⏻</button>
        </div>

        <div class="sidebar-section">
          <div class="section-header">
            <span class="category-title">💬 TEXT ROOMS</span>
            <div class="header-actions">
              <span id="action-create-room" title="Create Room">+</span>
              <span id="action-join-room" title="Join Room">🔗</span>
            </div>
          </div>
          <div id="rooms-list"></div>
        </div>

        <div class="sidebar-section">
          <div class="section-header">
            <span class="category-title">✉️ DIRECT MESSAGES</span>
          </div>
          <div id="dms-list"></div>
        </div>

        <div class="sidebar-section sidebar-section--online">
          <div class="section-header">
            <span class="category-title">👥 ONLINE USERS</span>
            <span id="online-count" class="online-count-badge">0</span>
          </div>
          <div id="online-users-list"></div>
        </div>
      </div>

      <!-- ── Chat Pane (center) ── -->
      <div class="chat-pane">
        <div id="active-chat-header" class="chat-header">
          <span id="chat-header-title"># select-a-channel</span>
          <div class="chat-header-actions">
            <button id="btn-show-invite" class="chat-header-btn hidden" title="Show Invite Code">🔗</button>
            <button id="btn-show-members" class="chat-header-btn hidden" title="Show Members">👥</button>
            <button id="btn-leave-room" class="chat-header-btn hidden" title="Leave Room">🚪</button>
          </div>
        </div>
        <div id="chat-log" class="chat-log"></div>

        <div class="input-dock">
          <div class="entry-container">
            <input
              type="text"
              id="entry-box"
              placeholder="Ketik pesan di sini..."
            />
          </div>
          <button id="btn-send" class="btn-send">SEND</button>
        </div>
      </div>

      <!-- ── Right Panel (Members / Invite) ── -->
      <div id="right-panel" class="right-panel hidden">
        <div class="right-panel-header">
          <span id="right-panel-title">Panel</span>
          <button id="btn-close-right-panel" class="right-panel-close">✕</button>
        </div>
        <div id="right-panel-body" class="right-panel-body"></div>
      </div>
    </div>

    <!-- ═══════ ROOM MODAL ═══════ -->
    <div id="room-modal" class="modal-backdrop hidden">
      <div class="modal-card">
        <h2 id="modal-title">Create Room</h2>
        <div class="modal-body">
          <div class="input-group">
            <label id="modal-label-1">ROOM NAME</label>
            <input type="text" id="modal-input-1" autocomplete="off" />
          </div>
          <div class="input-group" id="modal-field-2">
            <label id="modal-label-2">TOPIC</label>
            <input type="text" id="modal-input-2" autocomplete="off" />
          </div>
          <!-- Invite code result shown after room creation -->
          <div id="modal-invite-result" class="invite-result hidden">
            <label>INVITE CODE</label>
            <div class="invite-code-display">
              <code id="modal-invite-code"></code>
              <button id="btn-copy-invite" class="btn-copy" title="Copy">📋</button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="btn-modal-cancel" class="btn-secondary">Cancel</button>
          <button id="btn-modal-submit" class="btn-primary">Submit</button>
        </div>
      </div>
    </div>

    <!-- ═══════ EMOJI PICKER (floating) ═══════ -->
    <div id="emoji-picker" class="emoji-picker hidden">
      <div class="emoji-picker-grid">
        <span class="emoji-option" data-emoji="👍">👍</span>
        <span class="emoji-option" data-emoji="❤️">❤️</span>
        <span class="emoji-option" data-emoji="😂">😂</span>
        <span class="emoji-option" data-emoji="😮">😮</span>
        <span class="emoji-option" data-emoji="😢">😢</span>
        <span class="emoji-option" data-emoji="🔥">🔥</span>
        <span class="emoji-option" data-emoji="👎">👎</span>
        <span class="emoji-option" data-emoji="🎉">🎉</span>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
